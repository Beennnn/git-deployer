name: Publish add-on images
# Construit les images mono-arch de l'add-on et les pousse sur GHCR, pour une
# installation INSTANTANÉE (sans build local). Tant que config.yaml n'a pas de champ
# `image:`, HA continue de builder en local ; passer en pré-construit = ajouter
# `image: "ghcr.io/beennnn/git-deployer-{arch}"` + bump version (voir README).
#
# Migré 2026-07-16 de l'action `home-assistant/builder` (DÉPRÉCIÉE et non maintenue —
# elle refusait le `--target` sous-dossier : "No build information / config.json not
# found") vers `docker/build-push-action` + buildx/QEMU. Le Dockerfile de l'addon
# (ARG BUILD_FROM) est réutilisé tel quel ; la base HA per-arch fournit bashio + s6.
on:
  # TODO: réactiver le trigger `release` une fois un run vert observé + `image:` posé
  # dans config.yaml. En attendant l'addon s'installe très bien en build local.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:3.19
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:3.19
    steps:
      - uses: actions/checkout@v4

      - name: Lire la version de l'addon
        id: meta
        # grep+sed plutôt que yq : zéro dépendance, config.yaml a `version: "x.y.z"`.
        run: |
          v=$(grep -E '^version:' git-deployer/config.yaml | sed -E 's/.*"(.*)".*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Version addon : $v"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: git-deployer
          file: git-deployer/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          push: true
          tags: |
            ghcr.io/beennnn/git-deployer-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/beennnn/git-deployer-${{ matrix.arch }}:latest
