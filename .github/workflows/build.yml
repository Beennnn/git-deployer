name: Publish add-on images
# Construit les images multi-arch de l'add-on et les pousse sur GHCR, pour une
# installation INSTANTANÉE (sans build local). Déclenché à chaque release publiée
# (ou manuellement). Tant que config.yaml n'a pas de champ `image:`, HA continue de
# builder en local ; passer en pré-construit = ajouter `image:` (voir README).
on:
  # TODO: réactiver le trigger `release` une fois les args de home-assistant/builder
  # calés (build échoue actuellement sur /tmp/build_config/config.json). En attendant
  # l'addon s'installe très bien en build local. Déclenchement manuel uniquement :
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.arch }}
        # Pinné (pas @master flottant) — un builder récent parse le YAML en UTF-8,
        # ce qui corrige le `config.json not found` (l'ancien master échouait sur les
        # unicode → / « » de name+description lors de la conversion yaml→json).
        uses: home-assistant/builder@2026.06.0
        with:
          args: |
            --${{ matrix.arch }}
            --target git-deployer
            --image "git-deployer-{arch}"
            --docker-hub "ghcr.io/beennnn"
            --addon
